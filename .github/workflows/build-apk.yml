name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 7.6
    
    - name: Download Vosk Model
      run: |
        echo "📥 下载 Vosk 中文模型..."
        mkdir -p android/app/src/main/assets
        cd android/app/src/main/assets
        
        if [ -d "vosk-model-small-cn-0.22" ]; then
          echo "🗑️ 删除旧模型..."
          rm -rf vosk-model-small-cn-0.22
        fi
        
        wget -q --show-progress https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
        
        echo "📦 解压模型..."
        unzip -o -q vosk-model-small-cn-0.22.zip
        rm vosk-model-small-cn-0.22.zip
        
        echo "✅ 模型准备完成"
        ls -lh vosk-model-small-cn-0.22/
    
    - name: Grant execute permission for gradlew
      run: |
        if [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
        else
          echo "⚠️ gradlew not found, will use gradle wrapper task"
        fi
    
    - name: Generate Gradle Wrapper
      working-directory: ./android
      run: |
        if [ ! -f "gradlew" ]; then
          echo "📝 生成 Gradle Wrapper..."
          gradle wrapper --gradle-version 7.6
        fi
    
    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build Release APK
      working-directory: ./android
      run: ./gradlew assembleRelease
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
