name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 7.6
    
    - name: Download Vosk Model
      run: |
        echo "📥 下载 Vosk 中文模型..."
        mkdir -p android/app/src/main/assets
        cd android/app/src/main/assets
        
        if [ -d "vosk-model-small-cn-0.22" ]; then
          rm -rf vosk-model-small-cn-0.22
        fi
        
        wget -q https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
        unzip -o -q vosk-model-small-cn-0.22.zip
        rm vosk-model-small-cn-0.22.zip
        echo "✅ 模型准备完成"
    
    - name: Generate Gradle Wrapper
      working-directory: ./android
      run: |
        echo "📝 生成 Gradle Wrapper..."
        gradle wrapper --gradle-version 7.6
        chmod +x gradlew
    
    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
