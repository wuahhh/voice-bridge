name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Download Vosk Model
      run: |
        echo "📥 下载 Vosk 中文模型..."
        mkdir -p android/app/src/main/assets
        cd android/app/src/main/assets
        
        # 下载模型
        wget -q --show-progress https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
        
        echo "📦 解压模型..."
        unzip -q vosk-model-small-cn-0.22.zip
        rm vosk-model-small-cn-0.22.zip
        
        echo "✅ 模型准备完成"
        ls -lh vosk-model-small-cn-0.22/
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: ./android
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
      working-directory: ./android
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30